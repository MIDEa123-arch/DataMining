<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TED AI - Video & AI Questions</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo" id="nav-logo" style="cursor: pointer;">TED <span>AI</span></div>
        <div class="tagline">Ideas worth assessing</div>
    </header>

    <main class="container">
        <section id="home-view" class="view-section">
            <div class="hero-section">
                <h1>Học Tiếng Anh qua TED Talks</h1>
                <p>Tải nhiều video, hệ thống xử lý tuần tự rồi gán chủ đề, CEFR, câu hỏi và từ vựng.</p>
                <div class="upload-box card">
                    <input type="file" id="video-upload" accept="video/mp4,video/x-m4v,video/*" multiple>
                    <button id="btn-process" class="btn primary">Upload & Phân tích AI</button>
                </div>
                <div id="upload-queue" class="upload-queue hidden"></div>
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <span id="loading-text">AI đang phân tích... Xin chờ một lát.</span>
                </div>
            </div>

            <div id="topics-container" class="topics-container"></div>
        </section>

        <section id="learning-view" class="view-section hidden">
            <div class="back-nav">
                <button id="btn-back-home" class="btn secondary">← Quay lại danh mục</button>
                <h2 id="learning-title">Đang học...</h2>
                <button id="btn-delete-current" class="btn danger hidden">Xóa video</button>
            </div>

            <div id="player-section" style="margin-top: 1rem;">
                <div class="layout-grid">
                    <div class="video-container card">
                        <video id="video-player" controls>
                            <source src="" type="video/mp4">
                        </video>
                        <div class="cefr-badge">
                            <span>CEFR Level:</span>
                            <strong id="cefr-level-text">—</strong>
                            <span style="margin-left: 1rem; color: var(--text-muted);">Chủ đề:</span>
                            <strong id="topic-text" style="color: var(--text-main); font-weight: normal;">—</strong>
                        </div>
                    </div>

                    <div class="transcript-container card">
                        <div class="transcript-header">
                            <h3>Transcript</h3>
                            <button id="btn-full-transcript" class="btn secondary" style="padding:4px 10px; font-size:0.78rem;">Xem toàn văn</button>
                        </div>
                        <div id="transcript-box" class="transcript-box"></div>
                    </div>
                </div>

                <div id="full-transcript-section" class="hidden full-transcript-panel">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3 style="margin:0;">Full Transcript</h3>
                        <button class="btn secondary" style="padding:4px 10px; font-size:0.78rem;" onclick="document.getElementById('full-transcript-section').classList.add('hidden')">Đóng</button>
                    </div>
                    <p id="full-transcript-text"></p>
                </div>
            </div>

            <div id="questions-section" class="card" style="margin-top: 1.5rem;">
                <h2>Luyện tập</h2>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="mcq">Reading Comprehension</button>
                    <button class="tab-btn" data-tab="cloze">Cloze Test (Điền từ)</button>
                    <button class="tab-btn" data-tab="vocab">Từ vựng (Vocabulary)</button>
                </div>
                <div id="mcq-content" class="tab-content active"></div>
                <div id="cloze-content" class="tab-content"></div>
                <div id="vocab-content" class="tab-content"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
